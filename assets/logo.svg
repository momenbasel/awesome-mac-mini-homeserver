<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="mini" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="170" fill="url(#glow)"/>

  <!-- isometric Mac mini body -->
  <g transform="translate(256 270)">
    <!-- top face -->
    <polygon points="-120,-30 0,-80 120,-30 0,20" fill="#f3f4f6" stroke="#22d3ee" stroke-width="2"/>
    <!-- left face -->
    <polygon points="-120,-30 0,20 0,70 -120,20" fill="#cbd5e1" stroke="#22d3ee" stroke-width="2"/>
    <!-- right face -->
    <polygon points="120,-30 0,20 0,70 120,20" fill="#9ca3af" stroke="#22d3ee" stroke-width="2"/>
    <!-- power LED -->
    <circle cx="70" cy="-7" r="4" fill="#22d3ee" filter="url(#softGlow)"/>
  </g>

  <!-- agent tendrils -->
  <g stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#softGlow)" opacity="0.9">
    <path d="M 256 190 C 256 130 200 110 170 80" />
    <path d="M 256 190 C 256 130 312 110 342 80" />
    <path d="M 256 190 C 256 150 256 120 256 60" />
    <circle cx="170" cy="80" r="5" fill="#22d3ee"/>
    <circle cx="342" cy="80" r="5" fill="#22d3ee"/>
    <circle cx="256" cy="60" r="5" fill="#22d3ee"/>
  </g>

  <!-- bottom baseline glow -->
  <rect x="96" y="400" width="320" height="2" fill="#22d3ee" opacity="0.35"/>
</svg>
